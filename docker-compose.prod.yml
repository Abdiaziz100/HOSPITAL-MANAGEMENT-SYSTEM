version: '3.8'
services:

    environment
    build: .
    ports: ["3000:3000", "5000:5000"]
    environment:
      - NODE_ENV=production
    volumes: ["./data:/app/data"]
  redis:
    image: redis:alpine
    ports: ["6379:6379"]
  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf"]